name: Metrics  
on:  
  # 每天更新一次或两次就足够了，每小时更新会消耗大量的 GitHub Actions 额度
  schedule: [{cron: "0 0,12 * * *"}]  
  workflow_dispatch:  
  push: {branches: ["master", "main"]}  

jobs:  
  github-metrics:  
    runs-on: ubuntu-latest  
    permissions:  
      contents: write  
    steps:  
      - name: 📅 Isocalendar
        uses: lowlighter/metrics@latest  
        with:  
          filename: assets/metrics.plugin.isocalendar.fullyear.svg  
          token: ${{ secrets.METRICS_TOKEN }}  
          base: ""  
          plugin_isocalendar: yes  
          plugin_isocalendar_duration: full-year

      - name: 📊 Classic & Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          # 开启语言统计
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          # 开启代码行数统计
          plugin_lines: yes

      - name: ⏰ Habits & Activity
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Asia/Shanghai 
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact # 使用紧凑模式节省空间
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C # 仅显示 C 级及以上的成就

      - name: 🌟 Stars & Topics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
