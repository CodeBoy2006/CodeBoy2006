name: Metrics  
on:  
  # 每天更新一次或两次就足够了，每小时更新会消耗大量的 GitHub Actions 额度
  schedule: [{cron: "0 0,12 * * *"}]  
  workflow_dispatch:  
  push: {branches: ["master", "main"]}  

jobs:  
  github-metrics:  
    runs-on: ubuntu-latest  
    permissions:  
      contents: write  
    steps:  
      - name: 📅 Isocalendar
        uses: lowlighter/metrics@latest  
        with:  
          filename: assets/metrics.plugin.isocalendar.fullyear.svg  
          token: ${{ secrets.METRICS_TOKEN }}  
          base: ""  
          plugin_isocalendar: yes  
          plugin_isocalendar_duration: full-year

      - name: 📊 Classic & Languages
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          # 开启语言统计
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          # 开启代码行数统计
          plugin_lines: yes

      - name: ⏰ Habits & Activity
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Asia/Shanghai 
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

      - name:  📅 Full Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.calendar.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 3

      - name: 🈷️ Advanced Languages Activity
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: "" # 设为空表示这张图只生成语言统计，不包含基础头信息
          
          # 开启语言插件
          plugin_languages: yes
          
          # 1. 深度分析模式 (Indepth mode) - 极其重要
          # 开启后会真正 clone 你的仓库并扫描 commit，从而解锁 "lines" (代码行数) 统计
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15 # 设置超时时间防止 Action 运行太久失败
          
          # 2. 统计模块展示
          # 同时展示 "历史最常用" (most-used) 和 "近期正在用" (recently-used)
          plugin_languages_sections: most-used, recently-used
          # 展示细节：代码行数(开启 indepth 后才能用)、字节大小、百分比
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 8 # 最多展示 8 种语言
          
          # 3. 数据过滤 (让你的数据面板更专业)
          # 忽略一些属于配置/文档的语言，只保留硬核代码
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot, json, yaml, toml, ini, justfile
          # 隐藏占比低于 1% 的微小语言
          plugin_languages_threshold: 1%
          
          # 4. 近期动态配置 (针对 recently-used)
          # 仅扫描最近 14 天的 400 个事件
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 400
          
          # 5. 视觉与排版自定义
          # 给语言起个更简短的别名，防止面板拥挤
          plugin_languages_aliases: javascript:JS, typescript:TS, jupyter notebook:Jupyter
          # 可以使用自定义颜色，例如把 JS 变成红色：javascript:red。这里保持 github 默认
          plugin_languages_colors: github 
